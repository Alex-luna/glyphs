<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <link rel="manifest" href="/manifest.json" />
  <title>App simples</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 40rem; margin: 2rem auto; padding: 0 1rem; }
    input { padding: 0.5rem; margin-right: 0.5rem; }
    button { padding: 0.5rem 1rem; cursor: pointer; }
    li { margin: 0.25rem 0; }
  </style>
</head>
<body>
  <h1>App rodando</h1>
  <p>Scaffold Easypanel — edite <code>public/</code> e <code>server.js</code>.</p>

  <h2>Items (exemplo API)</h2>
  <form id="form">
    <input id="title" placeholder="Novo item" required />
    <button type="submit">Adicionar</button>
  </form>
  <ul id="list"></ul>

  <script>
    async function loadItems() {
      const res = await fetch('/api/items');
      const items = await res.json();
      document.getElementById('list').innerHTML = items
        .map((i) => `<li>${i.title}</li>`)
        .join('');
    }

    document.getElementById('form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const title = document.getElementById('title').value;
      console.log('submit item', title);
      await fetch('/api/items', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title }),
      });
      document.getElementById('title').value = '';
      loadItems();
    });

    loadItems();
  </script>
</body>
</html>

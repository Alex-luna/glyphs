<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glyph renderer — radial+ / arc</title>
    <link rel="stylesheet" href="./glyph-renderer.css" />
  </head>
  <body>
    <div class="shell">
      <p class="kicker">tools · glyph-renderer</p>
      <h1 class="title">glyph renderer</h1>
      <p class="note">
        Modos <code>radial</code> (núcleo + fluxos nomeados) e <code>arc</code>
        (jornada U). Cola JSON da skill <code>glyph</code> → render.
      </p>

      <div class="layout">
        <aside class="panel" aria-label="JSON input">
          <label class="panel-label" for="glyph-json">json</label>
          <textarea
            id="glyph-json"
            spellcheck="false"
            rows="18"
            placeholder='{ "metadados": { "modo": "radial"| "arc", ... }, "nos": [...], "conexoes": [...] }'
          ></textarea>
          <div class="panel-actions">
            <button type="button" id="btn-render">render</button>
            <button type="button" id="btn-example-radial" class="ghost">
              radial
            </button>
            <button type="button" id="btn-example-arc" class="ghost">arc</button>
          </div>
          <p class="panel-error" id="glyph-error" hidden></p>
        </aside>

        <aside
          class="glyph-viz"
          id="glyph-viz"
          aria-label="Systemic glyph visualization"
        >
          <div class="glyph-viz-head">
            <span class="label">
              <span class="pulse" aria-hidden="true"></span>
              <span class="head-text">
                <span class="tese" id="glyph-tese">cole um glifo</span>
                <span class="sub" id="glyph-sub"></span>
              </span>
            </span>
            <span class="meta" id="glyph-meta">—</span>
          </div>

          <div class="glyph-viz-canvas" id="glyph-canvas">
            <svg
              class="main"
              viewBox="-32 -32 464 464"
              preserveAspectRatio="xMidYMid meet"
              aria-hidden="true"
            >
              <defs>
                <pattern
                  id="gr-hatch"
                  width="6"
                  height="6"
                  patternUnits="userSpaceOnUse"
                  patternTransform="rotate(45)"
                >
                  <line
                    x1="0"
                    y1="0"
                    x2="0"
                    y2="6"
                    stroke="#9c9893"
                    stroke-width="0.6"
                    opacity="0.35"
                  />
                </pattern>
              </defs>
              <g id="gr-zones"></g>
              <g id="gr-edges-mesh"></g>
              <g id="gr-edges"></g>
              <g id="gr-edge-labels"></g>
              <g id="gr-packets"></g>
              <g id="gr-nodes"></g>
              <g id="gr-labels"></g>
            </svg>
          </div>

          <div class="glyph-narrative" id="glyph-narrative" hidden>
            <div class="narr-col">
              <span class="narr-kicker">problema</span>
              <p id="glyph-problema"></p>
            </div>
            <div class="narr-col">
              <span class="narr-kicker">trabalho</span>
              <p id="glyph-trabalho"></p>
            </div>
          </div>
        </aside>
      </div>
    </div>

    <script src="./glyph-renderer.js"></script>
  </body>
</html>

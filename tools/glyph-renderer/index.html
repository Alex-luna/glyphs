<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Glyph renderer — radial / arc / venn</title>
    <link rel="stylesheet" href="./glyph-renderer.css" />
  </head>
  <body>
    <div class="shell">
      <p class="kicker">tools · glyph-renderer · blueprint</p>
      <h1 class="title">glyph renderer</h1>
      <p class="note">
        Modos <code>radial</code>, <code>arc</code>, <code>venn</code>. Cola JSON
        da skill <code>glyph</code> → render. Estética schematic / blueprint.
      </p>

      <div class="layout">
        <aside class="panel" aria-label="JSON input">
          <label class="panel-label" for="glyph-json">json</label>
          <textarea
            id="glyph-json"
            spellcheck="false"
            rows="18"
            placeholder='{ "metadados": { "modo": "radial"|"arc"|"venn", ... } }'
          ></textarea>
          <div class="panel-actions">
            <button type="button" id="btn-render">render</button>
            <button type="button" id="btn-example-radial" class="ghost">
              radial
            </button>
            <button type="button" id="btn-example-arc" class="ghost">arc</button>
            <button type="button" id="btn-example-venn" class="ghost">
              venn
            </button>
          </div>
          <p class="panel-error" id="glyph-error" hidden></p>
        </aside>

        <aside
          class="glyph-viz"
          id="glyph-viz"
          aria-label="Systemic glyph visualization"
        >
          <div class="glyph-viz-head">
            <span class="label">
              <span class="pulse" aria-hidden="true"></span>
              <span class="head-text">
                <span class="tese" id="glyph-tese">cole um glifo</span>
                <span class="sub" id="glyph-sub"></span>
              </span>
            </span>
            <span class="meta" id="glyph-meta">—</span>
          </div>

          <div class="glyph-viz-canvas" id="glyph-canvas">
            <svg
              class="main"
              viewBox="-32 -32 464 464"
              preserveAspectRatio="xMidYMid meet"
              aria-hidden="true"
            >
              <defs>
                <pattern
                  id="gr-hatch"
                  width="6"
                  height="6"
                  patternUnits="userSpaceOnUse"
                  patternTransform="rotate(45)"
                >
                  <line
                    x1="0"
                    y1="0"
                    x2="0"
                    y2="6"
                    stroke="#9c9893"
                    stroke-width="0.6"
                    opacity="0.35"
                  />
                </pattern>
                <pattern
                  id="gr-blueprint-grid"
                  width="20"
                  height="20"
                  patternUnits="userSpaceOnUse"
                >
                  <path
                    d="M 20 0 L 0 0 0 20"
                    fill="none"
                    stroke="#2a2926"
                    stroke-width="0.5"
                  />
                </pattern>
                <marker
                  id="gr-arrow"
                  viewBox="0 0 10 10"
                  refX="8"
                  refY="5"
                  markerWidth="5"
                  markerHeight="5"
                  orient="auto-start-reverse"
                >
                  <path d="M 1 1 L 9 5 L 1 9 z" fill="#f2f0ed" />
                </marker>
              </defs>
              <g id="gr-blueprint"></g>
              <g id="gr-story"></g>
              <g id="gr-zones"></g>
              <g id="gr-edges-mesh"></g>
              <g id="gr-edges"></g>
              <g id="gr-edge-labels"></g>
              <g id="gr-packets"></g>
              <g id="gr-nodes"></g>
              <g id="gr-labels"></g>
            </svg>
          </div>

          <div class="glyph-narrative" id="glyph-narrative" hidden>
            <div class="narr-col">
              <span class="narr-kicker">diagnóstico</span>
              <p id="glyph-diagnostico"></p>
            </div>
            <div class="narr-col">
              <span class="narr-kicker">prática</span>
              <p id="glyph-pratica"></p>
            </div>
            <div class="narr-col narr-sintese" id="glyph-sintese-col" hidden>
              <span class="narr-kicker">síntese</span>
              <p id="glyph-sintese"></p>
            </div>
          </div>
        </aside>
      </div>
    </div>

    <script src="./glyph-renderer.js"></script>
  </body>
</html>
